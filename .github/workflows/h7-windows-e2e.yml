name: h7-windows-e2e

# Stage 0 technical gate (H7) の A3 (Windows E2E) を windows-latest ランナーで実行する。
# public リポジトリのため Actions は無料枠内 (baseline §6 cost-zero-verification-within-free-tier-c2 に適合)。
#
# 判定語彙は test-design.md §1 の pass / fail / blocked の 3 値。
# 実行できなかったものは blocked として記録し、pass へ読み替えない。

on:
  workflow_dispatch:
    inputs:
      marketplace_url:
        description: "URL 型 marketplace の marketplace.json を指す https URL"
        required: true
        default: "https://raw.githubusercontent.com/daishiman/HarnessHub/main/docs/features/feat-stage0-distribution-gate/verification-artifacts/marketplace.json"

jobs:
  windows-e2e:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: 環境情報を記録
        shell: pwsh
        run: |
          Write-Output "os=$env:RUNNER_OS"
          Write-Output "arch=$env:RUNNER_ARCH"
          node --version
          Write-Output "runner_image=$env:ImageOS"

      - name: claude CLI を導入
        shell: pwsh
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      # --- T-A3-00: 隔離下の認証維持 (E2E 本体より前段) ------------------------
      # ADR D4 のフォールバック判定。Windows で CLAUDE_CONFIG_DIR 隔離下に認証が
      # 維持されるかを先に確認し、E2E 本体の失敗と認証起因の失敗を切り分ける。
      - name: "T-A3-00 隔離下の CLI 応答"
        shell: pwsh
        run: |
          $cfg = Join-Path $env:RUNNER_TEMP 'h7-config'
          New-Item -ItemType Directory -Force -Path $cfg | Out-Null
          $env:CLAUDE_CONFIG_DIR = $cfg
          Write-Output "CLAUDE_CONFIG_DIR=$cfg"
          claude plugin marketplace list
          Write-Output "T-A3-00: exit=$LASTEXITCODE"

      # --- T-A1-02: url-marketplace add ---------------------------------------
      - name: "T-A1-02 url-marketplace add"
        shell: pwsh
        run: |
          $cfg = Join-Path $env:RUNNER_TEMP 'h7-config'
          $env:CLAUDE_CONFIG_DIR = $cfg
          claude plugin marketplace add "${{ inputs.marketplace_url }}"
          Write-Output "T-A1-02: exit=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit 1 }
          claude plugin marketplace list

      # --- T-A1-08: SSH 鍵の無い素の環境で github 型 source が解決できるか -----
      # 本 feature の想定利用者は「非エンジニアの作者」であり、その PC に GitHub の
      # SSH 鍵が設定されている前提は置けない。CI ランナーはその条件を忠実に再現する。
      # 失敗しても job は止めず、観測結果として記録する (continue-on-error)。
      - name: "T-A1-08 SSH 鍵なしでの install (素の環境の再現)"
        id: nossh
        continue-on-error: true
        shell: pwsh
        run: |
          $cfg = Join-Path $env:RUNNER_TEMP 'h7-config'
          $env:CLAUDE_CONFIG_DIR = $cfg
          $out = claude plugin install h7-probe@h7-url-marketplace 2>&1 | Out-String
          Write-Output $out
          if ($LASTEXITCODE -eq 0) {
            Write-Output "T-A1-08: pass (SSH 鍵なしでも解決できた)"
          } else {
            Write-Output "T-A1-08: fail (SSH 鍵なしでは解決できない)"
            if ($out -match 'git@github\.com') {
              Write-Output "原因: CLI が github source を SSH でクローンしている"
            }
            exit 1
          }

      # --- git URL を https へ書き換えてから再試行 -----------------------------
      # 上記が fail した場合の回避策が存在するかを確かめる。この書き換えを要する
      # ことは、非エンジニア作者に追加設定を求めることを意味し C1 の評価に効く。
      - name: "git URL を https へ書き換え"
        shell: pwsh
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global --get-regexp 'url\..*insteadof'

      # --- T-A1-03: url-marketplace install (書き換え後) ----------------------
      - name: "T-A1-03 url-marketplace install (https 書換後)"
        shell: pwsh
        run: |
          $cfg = Join-Path $env:RUNNER_TEMP 'h7-config'
          $env:CLAUDE_CONFIG_DIR = $cfg
          claude plugin install h7-probe@h7-url-marketplace
          Write-Output "T-A1-03: exit=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # --- T-A3-02: skill の列挙 (list だけでなく details まで見る) -----------
      # baseline §4.2 A3(b) / P03 F-12: list は plugin 単位の列挙であり
      # 「plugin は入ったが skill が読み込まれていない」状態を素通しし得る。
      - name: "T-A3-02 skill の列挙 (list + details)"
        shell: pwsh
        run: |
          $cfg = Join-Path $env:RUNNER_TEMP 'h7-config'
          $env:CLAUDE_CONFIG_DIR = $cfg
          claude plugin list
          $details = claude plugin details h7-probe 2>&1 | Out-String
          Write-Output $details
          if ($details -match 'Skills \(1\)' -and $details -match 'h7-probe-echo') {
            Write-Output "T-A3-02: pass"
          } else {
            Write-Output "T-A3-02: fail (component inventory に h7-probe-echo が現れない)"
            exit 1
          }

      # --- T-A1-04 / T-A1-05: bootstrap-installer 経路 (github 型) ------------
      - name: "T-A1-04 bootstrap-installer 実行 / T-A1-05 経路独立性"
        shell: pwsh
        run: |
          $cfg2 = Join-Path $env:RUNNER_TEMP 'h7-config-bootstrap'
          New-Item -ItemType Directory -Force -Path $cfg2 | Out-Null
          $env:CLAUDE_CONFIG_DIR = $cfg2
          & "$env:GITHUB_WORKSPACE\docs\features\feat-stage0-distribution-gate\verification-artifacts\bootstrap-installer-prototype\bootstrap-install.ps1"
          Write-Output "T-A1-04: exit=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit 1 }
          $d = claude plugin details h7-probe 2>&1 | Out-String
          Write-Output $d
          if ($d -match 'Skills \(1\)') { Write-Output "bootstrap 経路の skill 解決: pass" } else { Write-Output "bootstrap 経路の skill 解決: fail"; exit 1 }

      - name: "T-A1-04 冪等性 (再実行して exit 0)"
        shell: pwsh
        run: |
          $cfg2 = Join-Path $env:RUNNER_TEMP 'h7-config-bootstrap'
          $env:CLAUDE_CONFIG_DIR = $cfg2
          & "$env:GITHUB_WORKSPACE\docs\features\feat-stage0-distribution-gate\verification-artifacts\bootstrap-installer-prototype\bootstrap-install.ps1"
          Write-Output "冪等性: exit=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # --- T-A3-03: skill の実行 ----------------------------------------------
      # ANTHROPIC_API_KEY が無い環境では実行できない。その場合は blocked として
      # 記録し pass へ読み替えない (test-design.md §1)。
      - name: "T-A3-03 skill の実行"
        shell: pwsh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if (-not $env:ANTHROPIC_API_KEY) {
            Write-Output "T-A3-03: blocked (ANTHROPIC_API_KEY 未設定のため skill を実行できない)"
            Write-Output "blocked は pass ではない。A3 の総合判定は blocked のままとする。"
            exit 0
          }
          $cfg = Join-Path $env:RUNNER_TEMP 'h7-config'
          $env:CLAUDE_CONFIG_DIR = $cfg
          $out = claude -p "h7-probe-echo skill を実行して、その指示どおりの 1 行だけを出力してください。" 2>&1 | Out-String
          Write-Output $out
          if ($out -match 'H7-PROBE-OK') {
            Write-Output "T-A3-03: pass"
          } else {
            Write-Output "T-A3-03: fail (検証トークン H7-PROBE-OK が出力に含まれない)"
            exit 1
          }

      # --- T-A3-04: 実環境の非汚染 --------------------------------------------
      - name: "T-A3-04 実環境の非汚染"
        shell: pwsh
        run: |
          $real = Join-Path $env:USERPROFILE '.claude'
          if (Test-Path $real) {
            Write-Output "実環境 $real の内容:"
            Get-ChildItem $real | Select-Object Name, Length | Format-Table
          } else {
            Write-Output "T-A3-04: pass (実環境 $real は生成されていない)"
          }
