name: dev-pipeline-lint

# feat-dev-pipeline-improvement (qa-067) の 3 決定論検査を fail-closed で強制する。
# lint は違反検出時に exit 2 で job を落とす。open-residue の beads 状態は
# .beads/issues.jsonl (受動エクスポート) から解決し、--no-require-beads は使わない
# (使うと OR-003/OR-004 が無効化される。無効化には本 yaml の可視 diff が要る)。

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dev-pipeline-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: lint eval-log layout (直下残置/バイト同一重複/1MiB 超の遮断)
        run: python3 plugins/dev-graph/scripts/lint-eval-log-layout.py --repo-root .
        continue-on-error: false

      - name: lint improvement-handoff disposition (per-finding 消化状態の必須化)
        run: python3 plugins/dev-graph/scripts/lint-handoff-disposition.py --repo-root .
        continue-on-error: false

      - name: "lint open residue (解決済み事象の md/graph/beads 3 表現の乖離検出)"
        run: |
          if [ -f .beads/issues.jsonl ]; then
            python3 plugins/dev-graph/scripts/lint-open-residue.py --repo-root . \
              --beads-export .beads/issues.jsonl
          else
            # beads 受動エクスポートが無い CI では OR-001/OR-002 のみ強制する
            # (git 追跡ファイルで完結する軸)。OR-003/OR-004 は beads_axis=unavailable として
            # 未評価であることが JSON に記録される。--no-require-beads の使用は本 step の
            # 可視 diff としてのみ許され、握り潰しにはならない。
            python3 plugins/dev-graph/scripts/lint-open-residue.py --repo-root . \
              --no-require-beads
          fi
        continue-on-error: false

      - name: verify migration idempotency (再実行が差分 0 に収束する)
        run: |
          python3 plugins/dev-graph/scripts/migrate-pipeline-improvement.py --repo-root . --dry-run \
            | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d['moved_count']==0 and d['dispositions_added']==0 else 1)"
        continue-on-error: false
