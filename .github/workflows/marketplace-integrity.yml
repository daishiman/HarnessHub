name: marketplace-integrity

on:
  pull_request:
    branches: [main]
    paths:
      - "plugins/**"
      - ".claude-plugin/**"
      - "scripts/sync-plugins-from-harness.py"
      - ".github/workflows/marketplace-integrity.yml"
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: check marketplace integrity (plugin ディレクトリ ↔ エントリ ↔ version)
        run: python3 scripts/sync-plugins-from-harness.py --check-only
